<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Horizon_Tech Gallery</title>

    <meta name="theme-color" content="#0f172a">
    <meta name="robots" content="noindex">

    <link rel="icon" href="logo.svg" type="image/svg+xml">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;

            font-family:
                Inter,
                Segoe UI,
                sans-serif;

            background:
                radial-gradient(circle at top left,#2563eb33,transparent 35%),
                radial-gradient(circle at bottom right,#7c3aed33,transparent 35%),
                #0f172a;

            color:#fff;
            padding:20px;
        }

        .bg-glow{
            position:absolute;
            width:500px;
            height:500px;
            border-radius:50%;

            background:#2563eb22;

            filter:blur(120px);

            animation:
                floatGlow 8s ease-in-out infinite;
        }

        .bg-glow.two{
            background:#7c3aed22;
            animation-delay:3s;
        }

        @keyframes floatGlow{
            0%,100%{
                transform:
                    translate(0,0)
                    scale(1);
            }

            50%{
                transform:
                    translate(40px,-40px)
                    scale(1.2);
            }
        }

        .card{
            position:relative;

            width:100%;
            max-width:650px;

            padding:50px;

            text-align:center;

            background:
                rgba(255,255,255,.05);

            backdrop-filter:blur(20px);

            border:
                1px solid rgba(255,255,255,.08);

            border-radius:28px;

            box-shadow:
                0 20px 80px rgba(0,0,0,.35);

            z-index:5;
        }

        .logo{
            width:100px;
            height:100px;
            margin-bottom:20px;
        }

        .error-code{
            font-size:120px;
            font-weight:900;

            line-height:1;

            background:
                linear-gradient(
                    135deg,
                    #60a5fa,
                    #a855f7
                );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .title{
            font-size:32px;
            font-weight:700;
            margin-top:15px;
        }

        .subtitle{
            color:#cbd5e1;
            margin-top:15px;
            line-height:1.8;
            font-size:16px;
        }

        .btn-group{
            display:flex;
            gap:15px;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:35px;
        }

        .btn{
            padding:14px 24px;
            border-radius:14px;

            text-decoration:none;

            font-weight:600;

            transition:.3s ease;
        }

        .btn-primary{
            background:#2563eb;
            color:white;
        }

        .btn-primary:hover{
            transform:translateY(-3px);
        }

        .btn-secondary{
            border:1px solid #334155;
            color:#fff;
            background:#111827;
        }

        .btn-secondary:hover{
            transform:translateY(-3px);
        }

        .footer{
            margin-top:35px;
            font-size:13px;
            color:#94a3b8;
        }

        @media(max-width:768px){

            .card{
                padding:35px 25px;
            }

            .error-code{
                font-size:80px;
            }

            .title{
                font-size:24px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>
    <div class="bg-glow two"></div>

    <div class="card">

        <img
            src="logo.svg"
            alt="Horizon Gallery"
            class="logo">

        <div class="error-code">
            404
        </div>

        <h1 class="title">
            Page Not Found
        </h1>

        <p class="subtitle">
            The page you're looking for doesn't exist,

        </p>

                Go Home
            </a>

                href="javascript:history.back()"

            </a>

        </div>

        <div class="footer">
            Horizon_Tech Gallery • Powered by <a href="https://akshat-881236.github.io/AkshatNetworkHub/">Akshat Network Hub</a>
        </div>

    </div>

</body>
</html>
